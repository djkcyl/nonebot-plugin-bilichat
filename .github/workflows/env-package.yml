name: Python Env Package

on:
  release:
    types: [published]

permissions:
    contents: read


jobs:
    deploy:
        runs-on: windows-latest

        steps:
        - uses: actions/checkout@v3

        - name: micromamba create
          uses: mamba-org/setup-micromamba@v1
          with:
            environment-name: env
            create-args: >-
                python=3.10

        - name: install dependencies
          env:
            PLAYWRIGHT_BROWSERS_PATH: browser
          run: |
            C:\Users\runneradmin\micromamba\envs\env\python.exe -m pip install -e .[all,dev]
            C:\Users\runneradmin\micromamba\envs\env\python.exe -m pip install nonebot-adapter-onebot nonebot-adapter-satori
            C:\Users\runneradmin\micromamba\envs\env\python.exe -m playwright install chromium

        - name: copy env dir
          run: cp -r C:\Users\runneradmin\micromamba\envs\env .runtime

        - name: create start script
          run: Set-Content -Path ".\start.bat" -Value "@echo off`nset PLAYWRIGHT_BROWSERS_PATH=browser`n.runtime\python bot.py`npause"

        - name: zip project
          run: Compress-Archive -Path . -DestinationPath bilichat-bot-windows-with-env.zip

        - name: upload release asset
          uses: softprops/action-gh-release@v2
          if: startsWith(github.ref, 'refs/tags/')
          with:
            files: bilichat-bot-windows-with-env.zip